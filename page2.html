<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Amir 🤍</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#101828;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
color:white;
text-align:center;
padding:25px;
}

.card{
max-width:700px;
animation:fade 1.5s;
}

h1{
font-size:36px;
margin-bottom:25px;
}

p{
font-size:22px;
line-height:2;
opacity:.9;
margin-bottom:40px;
}

button{
padding:15px 35px;
border:none;
border-radius:35px;
background:white;
font-size:18px;
cursor:pointer;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="card">

<h1>🤍</h1>

<p>

اگه تا اینجا اومدی...

یعنی چند دقیقه از روزت رو
به من هدیه دادی.

و همین،
برای من
خیلی ارزشمنده. ☘️

</p>

<button onclick="location.href='letter.html'">

ادامه...

</button>

</div>

</body>

</html>
